name: GitHub Container Registry Build

on:
  workflow_dispatch:

env:
  IMAGE_NAME: webmap

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: image-tags
        run: |
          OWNER_LOWER="${{ github.repository_owner }}"
          OWNER_LOWER="${OWNER_LOWER,,}"
          echo "OWNER_LOWER=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          IMAGE_REF="ghcr.io/${OWNER_LOWER}/${{ env.IMAGE_NAME }}"
          echo "SUBJECT_NAME=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "TAGS=${IMAGE_REF}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" =~ ^refs/tags/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            printf "TAGS=%s\n%s\n" "${IMAGE_REF}:${VERSION}" "${IMAGE_REF}:latest" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA:0:8}"
            echo "TAGS=${IMAGE_REF}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.image-tags.outputs.TAGS }}

      - name: Generate artifact attestation
        if: always()
        uses: actions/attest-build-provenance@v3
        with:
          push-to-registry: true
          subject-name: ${{ steps.image-tags.outputs.SUBJECT_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
